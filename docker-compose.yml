version: "3.8"

services:
  vision:
    build:
      context: ./agents/vision
    ports:
      - "8001:8001"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    devices:
      - /dev/video0:/dev/video0
    restart: unless-stopped

  nyc_data:
    build:
      context: ./agents/nyc_data
    ports:
      - "8002:8002"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    restart: unless-stopped

  orchestrator:
    build:
      context: ./agents/orchestrator
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - VISION_AGENT_URL=http://vision:8001
      - NYC_AGENT_URL=http://nyc_data:8002
    depends_on:
      - vision
      - nyc_data
    restart: unless-stopped
