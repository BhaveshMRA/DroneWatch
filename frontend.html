<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DroneWatch — Real-time Vision AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;700&display=swap" rel="stylesheet" />

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0a0c0f;
    --bg2:      #0f1318;
    --bg3:      #151b22;
    --accent:   #00ff88;
    --red:      #ff3355;
    --yellow:   #ffcc00;
    --text:     #c8d6e5;
    --dim:      #5a6a7a;
    --border:   #1e2a35;
    --font:     'IBM Plex Mono', monospace;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overflow: hidden; }

  /* ── HEADER ─────────────────────────────────────────────── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px; background: var(--bg2);
    border-bottom: 1px solid var(--border); height: 52px;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .pulse-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent);
    animation: pulse-dot 1.5s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%,100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(0,255,136,.6); }
    50%      { opacity: .8; transform: scale(1.15); box-shadow: 0 0 0 6px rgba(0,255,136,0); }
  }
  .header-title { font-size: 18px; font-weight: 700; letter-spacing: 2px; color: #fff; }
  .header-title span { color: var(--accent); }
  .status-badge {
    padding: 3px 12px; border-radius: 20px; font-size: 11px; font-weight: 700;
    letter-spacing: 1.5px; border: 1px solid;
    transition: all .3s;
  }
  .status-badge.live    { background: rgba(0,255,136,.1); border-color: var(--accent); color: var(--accent); }
  .status-badge.connecting { background: rgba(255,204,0,.1); border-color: var(--yellow); color: var(--yellow); }
  .status-badge.offline { background: rgba(255,51,85,.1); border-color: var(--red); color: var(--red); }

  /* ── MAIN LAYOUT ─────────────────────────────────────────── */
  .main {
    display: flex; height: calc(100vh - 52px);
  }

  /* ── LEFT PANEL (camera) ─────────────────────────────────── */
  .panel-feed {
    flex: 1; position: relative; background: #000; overflow: hidden;
  }
  .camera-img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    opacity: 0; transition: opacity .5s;
  }
  .camera-img.loaded { opacity: 1; }

  /* HUD corners */
  .hud { position: absolute; inset: 0; pointer-events: none; }
  .corner {
    position: absolute; width: 30px; height: 30px;
    border-color: var(--accent); border-style: solid; opacity: .7;
  }
  .corner.tl { top: 16px; left: 16px; border-width: 2px 0 0 2px; }
  .corner.tr { top: 16px; right: 16px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: 16px; left: 16px; border-width: 0 0 2px 2px; }
  .corner.br { bottom: 16px; right: 16px; border-width: 0 2px 2px 0; }

  /* Scan line */
  .scanline {
    position: absolute; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, rgba(0,255,136,.5), transparent);
    animation: scan 3s linear infinite;
  }
  @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

  /* Timestamp */
  .hud-ts {
    position: absolute; bottom: 12px; left: 16px;
    font-size: 11px; color: var(--accent); letter-spacing: 1px; opacity: .8;
  }
  .hud-label {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    font-size: 11px; color: rgba(0,255,136,.6); letter-spacing: 3px;
  }

  /* No-camera placeholder */
  .no-feed {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
    color: var(--dim); font-size: 13px;
  }
  .no-feed-icon { font-size: 48px; }

  /* ── RIGHT PANEL (alerts) ──────────────────────────────────── */
  .panel-alerts {
    width: 340px; min-width: 340px;
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    background: var(--bg2);
  }

  .alerts-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 11px; letter-spacing: 2px; color: var(--dim);
    display: flex; justify-content: space-between; align-items: center;
  }

  /* Current alert card */
  .current-alert {
    margin: 14px; padding: 14px;
    border-radius: 6px; border: 1px solid;
    font-size: 13px; line-height: 1.6;
    transition: all .3s;
    min-height: 80px;
  }
  .current-alert.clear  { border-color: var(--accent); background: rgba(0,255,136,.05); color: var(--accent); }
  .current-alert.alert  { border-color: var(--red); background: rgba(255,51,85,.08); color: var(--red); animation: flash .5s ease 3; }
  .current-alert.neutral { border-color: var(--border); background: var(--bg3); color: var(--text); }
  @keyframes flash {
    0%,100% { background: rgba(255,51,85,.08); }
    50%      { background: rgba(255,51,85,.25); }
  }

  /* Stats row */
  .stats {
    display: flex; gap: 0;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    margin: 0 0 4px;
  }
  .stat {
    flex: 1; padding: 8px 0; text-align: center;
    font-size: 11px; color: var(--dim); border-right: 1px solid var(--border);
  }
  .stat:last-child { border-right: none; }
  .stat-val { font-size: 18px; font-weight: 700; display: block; }
  .stat-val.green { color: var(--accent); }
  .stat-val.red   { color: var(--red); }

  /* Event log */
  .log-title {
    padding: 8px 16px 4px; font-size: 10px; letter-spacing: 2px; color: var(--dim);
  }
  .event-log {
    flex: 1; overflow-y: auto; padding: 0 12px 12px;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  .event-log::-webkit-scrollbar { width: 4px; }
  .event-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .event-item {
    padding: 6px 10px; margin-bottom: 4px; border-radius: 4px;
    font-size: 11px; line-height: 1.5;
    border-left: 2px solid;
    background: var(--bg3);
    animation: fadeIn .3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
  .event-item.clear  { border-color: var(--accent); color: var(--text); }
  .event-item.alert  { border-color: var(--red); color: var(--text); }
  .event-time { color: var(--dim); font-size: 10px; margin-right: 6px; }

  /* Voice button */
  .voice-section {
    padding: 14px; border-top: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 8px;
  }
  .voice-btn {
    width: 100%; padding: 12px; border-radius: 6px; cursor: pointer;
    font-family: var(--font); font-size: 12px; font-weight: 700; letter-spacing: 2px;
    border: 1px solid var(--accent); color: var(--accent);
    background: rgba(0,255,136,.05);
    transition: all .2s; user-select: none;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .voice-btn:hover { background: rgba(0,255,136,.12); }
  .voice-btn.recording { background: rgba(255,51,85,.12); border-color: var(--red); color: var(--red); animation: pulse-btn 1s ease infinite; }
  @keyframes pulse-btn { 0%,100% { box-shadow: 0 0 0 0 rgba(255,51,85,.4); } 50% { box-shadow: 0 0 0 8px rgba(255,51,85,0); } }
  .voice-hint { font-size: 10px; color: var(--dim); text-align: center; letter-spacing: 1px; }

  /* Query input */
  .query-row {
    display: flex; gap: 6px;
  }
  .query-input {
    flex: 1; padding: 8px 10px; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text); font-family: var(--font); font-size: 12px;
    outline: none;
  }
  .query-input:focus { border-color: var(--accent); }
  .query-submit {
    padding: 8px 14px; background: var(--accent); color: #000; border: none;
    border-radius: 4px; font-family: var(--font); font-size: 11px; font-weight: 700;
    cursor: pointer; letter-spacing: 1px;
  }
  .query-submit:hover { opacity: .85; }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <div class="pulse-dot"></div>
    <span class="header-title">Drone<span>Watch</span></span>
  </div>
  <div id="statusBadge" class="status-badge connecting">CONNECTING</div>
</header>

<!-- MAIN -->
<main class="main">

  <!-- CAMERA FEED (left) -->
  <section class="panel-feed" id="feedPanel">
    <div class="no-feed" id="noFeed">
      <div class="no-feed-icon">🛸</div>
      <div>Connecting to Vision Agent...</div>
      <div style="font-size:11px;color:#3a4a5a">localhost:8001</div>
    </div>
    <img id="cameraImg" class="camera-img" alt="Live camera feed" />
    <div class="hud">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div class="scanline"></div>
      <div class="hud-label">DRONEWATCH · LIVE</div>
      <div class="hud-ts" id="hudTs">--:--:--</div>
    </div>
  </section>

  <!-- ALERTS PANEL (right) -->
  <aside class="panel-alerts">
    <div class="alerts-header">
      <span>ALERT FEED</span>
      <span id="wsStatus" style="color:var(--yellow)">CONNECTING</span>
    </div>

    <div id="currentAlert" class="current-alert neutral">
      Waiting for scene analysis...
    </div>

    <div class="stats">
      <div class="stat">
        <span class="stat-val green" id="countClear">0</span>
        CLEAR
      </div>
      <div class="stat">
        <span class="stat-val red" id="countAlert">0</span>
        ALERT
      </div>
      <div class="stat">
        <span class="stat-val" id="countTotal">0</span>
        TOTAL
      </div>
    </div>

    <div class="log-title">EVENT LOG</div>
    <div class="event-log" id="eventLog"></div>

    <div class="voice-section">
      <div class="query-row">
        <input class="query-input" id="queryInput" type="text" placeholder="Ask DroneWatch..." />
        <button class="query-submit" id="querySubmit">ASK</button>
      </div>
      <button class="voice-btn" id="voiceBtn">
        <span>🎤</span>
        <span id="voiceBtnLabel">HOLD TO TALK</span>
      </button>
      <div class="voice-hint">Barge-in supported · Powered by Gemini Live API</div>
    </div>
  </aside>

</main>

<script>
// ────────────────────────────────────────────────────────────────
// Config — auto-detect backend
// ────────────────────────────────────────────────────────────────
const VISION_BASE  = 'http://localhost:8001';
const ORCH_BASE    = 'http://localhost:8000';
const FRAME_URL    = `${VISION_BASE}/frame`;
const WS_ALERTS    = `ws://localhost:8001/ws`;
const WS_VOICE     = `ws://localhost:8000/voice`;
const WS_ORCH      = `ws://localhost:8000/ws`;

// ────────────────────────────────────────────────────────────────
// State
// ────────────────────────────────────────────────────────────────
let countClear = 0, countAlert = 0;
let mediaRecorder = null, recording = false;
let alertWs = null, orchWs = null;

// ────────────────────────────────────────────────────────────────
// Timestamp
// ────────────────────────────────────────────────────────────────
function updateTs() {
  document.getElementById('hudTs').textContent = new Date().toLocaleTimeString('en-US', { hour12: false });
}
setInterval(updateTs, 1000);
updateTs();

// ────────────────────────────────────────────────────────────────
// Status badge
// ────────────────────────────────────────────────────────────────
function setStatus(state) {
  const badge = document.getElementById('statusBadge');
  badge.className = `status-badge ${state}`;
  badge.textContent = state.toUpperCase();
}

// ────────────────────────────────────────────────────────────────
// Camera frame polling
// ────────────────────────────────────────────────────────────────
const cameraImg  = document.getElementById('cameraImg');
const noFeed     = document.getElementById('noFeed');
let frameFailures = 0;

async function pollFrame() {
  try {
    const res = await fetch(FRAME_URL);
    const data = await res.json();
    if (data.frame) {
      cameraImg.src = `data:image/jpeg;base64,${data.frame}`;
      cameraImg.classList.add('loaded');
      noFeed.style.display = 'none';
      setStatus('live');
      frameFailures = 0;
    }
  } catch(e) {
    frameFailures++;
    if (frameFailures > 5) {
      noFeed.style.display = 'flex';
      setStatus('offline');
    }
  }
}
setInterval(pollFrame, 200);
pollFrame();

// ────────────────────────────────────────────────────────────────
// Alert WebSocket (from Vision Agent)
// ────────────────────────────────────────────────────────────────
function connectAlertWs() {
  alertWs = new WebSocket(WS_ALERTS);

  alertWs.onopen = () => {
    document.getElementById('wsStatus').textContent = 'CONNECTED';
    document.getElementById('wsStatus').style.color = 'var(--accent)';
    setStatus('live');
  };

  alertWs.onmessage = (e) => {
    const text = e.data;
    if (text === 'ping') return;
    processAlert(text);
  };

  alertWs.onclose = () => {
    document.getElementById('wsStatus').textContent = 'RECONNECTING';
    document.getElementById('wsStatus').style.color = 'var(--yellow)';
    setStatus('connecting');
    setTimeout(connectAlertWs, 2000);
  };

  alertWs.onerror = () => {
    setStatus('offline');
  };
}
connectAlertWs();

// ────────────────────────────────────────────────────────────────
// Orchestrator WebSocket (text queries)
// ────────────────────────────────────────────────────────────────
function connectOrchWs() {
  orchWs = new WebSocket(WS_ORCH);
  orchWs.onmessage = (e) => {
    processAlert(`[AI]: ${e.data}`);
  };
  orchWs.onclose = () => setTimeout(connectOrchWs, 3000);
}
connectOrchWs();

// ────────────────────────────────────────────────────────────────
// Process + display alert
// ────────────────────────────────────────────────────────────────
function processAlert(text) {
  const isAlert  = text.toUpperCase().startsWith('ALERT');
  const isClear  = text.toUpperCase().startsWith('CLEAR');
  const type     = isAlert ? 'alert' : isClear ? 'clear' : 'neutral';

  // Update current alert card
  const card = document.getElementById('currentAlert');
  card.textContent = text;
  card.className   = `current-alert ${type}`;

  // Stats
  if (isClear) { countClear++; document.getElementById('countClear').textContent = countClear; }
  if (isAlert) { countAlert++; document.getElementById('countAlert').textContent = countAlert; }
  document.getElementById('countTotal').textContent = countClear + countAlert;

  // Add to event log
  addLogEntry(text, type);
}

function addLogEntry(text, type) {
  const log  = document.getElementById('eventLog');
  const item = document.createElement('div');
  item.className = `event-item ${type}`;
  const ts = new Date().toLocaleTimeString('en-US', { hour12: false });
  item.innerHTML = `<span class="event-time">${ts}</span>${escHtml(text.slice(0, 120))}`;
  log.insertBefore(item, log.firstChild);

  // Keep max 50 entries
  const items = log.querySelectorAll('.event-item');
  if (items.length > 50) items[items.length - 1].remove();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ────────────────────────────────────────────────────────────────
// Text query
// ────────────────────────────────────────────────────────────────
document.getElementById('querySubmit').onclick = sendQuery;
document.getElementById('queryInput').onkeydown = (e) => { if (e.key === 'Enter') sendQuery(); };

function sendQuery() {
  const input = document.getElementById('queryInput');
  const question = input.value.trim();
  if (!question) return;
  input.value = '';

  // Try orchestrator WS first, fall back to REST
  if (orchWs && orchWs.readyState === WebSocket.OPEN) {
    orchWs.send(question);
    addLogEntry(`[YOU]: ${question}`, 'neutral');
  } else {
    fetchOrchAlert(question);
  }
}

async function fetchOrchAlert(question) {
  try {
    addLogEntry(`[YOU]: ${question}`, 'neutral');
    const res = await fetch(`${ORCH_BASE}/alert`);
    const data = await res.json();
    processAlert(data.text || 'No response');
  } catch(e) {
    // Fallback to vision only
    try {
      const res = await fetch(`${VISION_BASE}/analyze`, { method: 'POST' });
      const data = await res.json();
      processAlert(data.text || 'ERROR: Cannot reach DroneWatch agents.');
    } catch(err) {
      processAlert('ERROR: Cannot reach DroneWatch agents. Check backend is running.');
    }
  }
}

// ────────────────────────────────────────────────────────────────
// Voice (hold to talk → Gemini Live)
// ────────────────────────────────────────────────────────────────
const voiceBtn  = document.getElementById('voiceBtn');
const voiceLabel = document.getElementById('voiceBtnLabel');
let voiceWs = null;
let audioCtx = null;

async function startVoice() {
  if (recording) return;
  recording = true;
  voiceBtn.classList.add('recording');
  voiceLabel.textContent = 'LISTENING...';

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    voiceWs = new WebSocket(WS_VOICE);

    voiceWs.onopen = () => {
      mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
      mediaRecorder.ondataavailable = (e) => {
        if (voiceWs && voiceWs.readyState === WebSocket.OPEN && e.data.size > 0) {
          voiceWs.send(e.data);
        }
      };
      mediaRecorder.start(100); // chunk every 100ms
    };

    voiceWs.onmessage = (e) => {
      if (typeof e.data === 'string') {
        try {
          const msg = JSON.parse(e.data);
          if (msg.text) processAlert(`[Voice AI]: ${msg.text}`);
          if (msg.error) processAlert(`[Error]: ${msg.error}`);
        } catch(err) {
          processAlert(`[Voice AI]: ${e.data}`);
        }
      } else {
        // Play audio response
        playAudioBytes(e.data);
      }
    };

    voiceWs.onclose = () => stopVoice();
    voiceWs.onerror = () => {
      processAlert('[Voice]: Cannot connect to Orchestrator Agent (port 8000). Using text mode.');
      stopVoice();
    };

  } catch(err) {
    processAlert(`[Voice Error]: ${err.message}`);
    stopVoice();
  }
}

function stopVoice() {
  recording = false;
  voiceBtn.classList.remove('recording');
  voiceLabel.textContent = 'HOLD TO TALK';
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(t => t.stop());
    mediaRecorder = null;
  }
  if (voiceWs) {
    voiceWs.close();
    voiceWs = null;
  }
}

async function playAudioBytes(buffer) {
  try {
    if (!audioCtx) audioCtx = new AudioContext();
    const arrayBuf = await buffer.arrayBuffer();
    const decoded  = await audioCtx.decodeAudioData(arrayBuf);
    const source   = audioCtx.createBufferSource();
    source.buffer  = decoded;
    source.connect(audioCtx.destination);
    source.start();
  } catch(e) {
    console.warn('Audio playback error:', e);
  }
}

// Hold to talk
voiceBtn.addEventListener('mousedown', startVoice);
voiceBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startVoice(); });
voiceBtn.addEventListener('mouseup', stopVoice);
voiceBtn.addEventListener('touchend', stopVoice);
voiceBtn.addEventListener('mouseleave', () => { if (recording) stopVoice(); });
</script>
</body>
</html>
